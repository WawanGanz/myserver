
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minecraft server crossplay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --java-color: #ff6b6b;
            --bedrock-color: #4ecdc4;
            --text: #ffffff;
            --accent: #ffd93d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.ibb.co.com/N6Rx8FwN/2026-03-17-23-00-05.png') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.1;
            z-index: -1;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 40px var(--accent); }
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--java-color), var(--bedrock-color));
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .java::before { background: var(--java-color); }
        .bedrock::before { background: var(--bedrock-color); }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .java h2 { color: var(--java-color); }
        .bedrock h2 { color: var(--bedrock-color); }

        .info-row {
            background: rgba(255, 255, 255, 0.05);
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .info-row:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .value {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text);
            word-break: break-all;
        }

        .btn-copy {
            margin-top: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-copy::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-copy:hover::before {
            left: 100%;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .java .btn-copy:active { background: var(--java-color); color: #000; }
        .bedrock .btn-copy:active { background: var(--bedrock-color); color: #000; }

        .btn-copy + .btn-copy {
            margin-top: 10px;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #toast.show {
            visibility: visible;
            animation: slideUp 0.5s ease-out, fadeOut 0.5s ease-in 2.5s;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        footer p {
            margin: 0 0 10px 0;
        }

        footer ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .card { padding: 20px; }
            .container { gap: 20px; }
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px; text-shadow: 2px 2px #000;">Join Happy Games Smp</h1>

    <div class="container">
        <div class="card java">
            <h2>Minecraft Java 1.21.11</h2>
            <div class="info-row">
                <span class="label">Server Address</span>
                <span class="value" id="java-ip">play.happygmc.my.id</span>
            </div>
            <button class="btn-copy" onclick="copyText('java-ip')">SALIN IP JAVA</button>
        </div>

        <div class="card bedrock">
            <h2>Minecraft Bedrock 26.3</h2>
            <div class="info-row">
                <span class="label">Server Address</span>
                <span class="value" id="be-ip">play.happygmc.my.id</span>
            </div>
            <div class="info-row">
                <span class="label">Port</span>
                <span class="value" id="be-port">25407</span>
            </div>
            <button class="btn-copy" onclick="copyText('be-ip')">SALIN IP</button>
            <button class="btn-copy" onclick="copyText('be-port')" style="margin-top: 5px;">SALIN PORT</button>
        </div>
    </div>

    <div id="toast">Berhasil disalin!</div>

    <script>
        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast(`"${text}" disalin ke clipboard!`);
            }).catch(() => {
                showToast("Gagal menyalin. Browser tidak mendukung atau perlu HTTPS.");
            });
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.classList.add("show");
            setTimeout(function(){ x.classList.remove("show"); }, 3000);
        }
    </script>
<footer>
    <p>&copy; 2026 Wawan.happygmc. All rights reserved.</p>
    <ul>
        <li><a href="#">Terms of Service</a></li>
        <li><a href="#">Privacy Policy</a></li>
    </ul>
</footer>


</body>
</html>
